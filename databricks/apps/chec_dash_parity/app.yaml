command:
  - sh
  - -c
  - >-
    gunicorn --workers 1 --threads 2 --timeout 120
    --bind "0.0.0.0:${DATABRICKS_APP_PORT}"
    databricks_app_wsgi:app
env:
  - name: ENVIRONMENT
    value: databricks_app
  - name: DATA_BACKEND
    value: databricks_sql
  - name: API_TRANSPORT
    value: inproc
  - name: OUTPUT_DIR
    value: /tmp/outputs
  - name: CACHE_ENABLED
    value: "true"
  - name: MODEL_BACKEND
    value: mock
  - name: CHATBOT_ENABLED
    value: "__CHATBOT_ENABLED__"
  - name: CHATBOT_CORPUS_DIR
    value: ""
  - name: CHATBOT_CORPUS_VOLUME_DIR
    valueFrom: "__CHATBOT_CORPUS_VOLUME_RESOURCE_KEY__"
  - name: CHATBOT_CORPUS_SUBDIR
    value: "__CHATBOT_CORPUS_SUBDIR__"
  - name: CHATBOT_RETRIEVAL_TOP_K
    value: "__CHATBOT_RETRIEVAL_TOP_K__"
  - name: CHATBOT_MAX_CONTEXT_CHARS
    value: "__CHATBOT_MAX_CONTEXT_CHARS__"
  - name: GEMINI_MODEL
    value: "__GEMINI_MODEL__"
__GEMINI_API_KEY_ENV__
  - name: DATABRICKS_SQL_WAREHOUSE_ID
    value: __WAREHOUSE_ID__
  - name: DATABRICKS_CATALOG_NAME
    value: __CATALOG_NAME__
  - name: DATABRICKS_GOLD_SCHEMA
    value: __GOLD_SCHEMA__
  - name: DATABRICKS_SILVER_SCHEMA
    value: __SILVER_SCHEMA__
