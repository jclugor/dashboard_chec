version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "uvicorn run_api:app
      --host 0.0.0.0
      --port ${API_PORT:-8000}
      --workers ${UVICORN_WORKERS:-1}"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      API_PORT: ${API_PORT:-8000}
      DATA_DIR: /app/data
      OUTPUT_DIR: /tmp/outputs
      MODEL_BACKEND: ${MODEL_BACKEND:-mock}
      DATABRICKS_HOST: ${DATABRICKS_HOST:-}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
      DATABRICKS_MODEL_ENDPOINT: ${DATABRICKS_MODEL_ENDPOINT:-}
      AZURE_ML_ENDPOINT: ${AZURE_ML_ENDPOINT:-}
      AZURE_ML_KEY: ${AZURE_ML_KEY:-}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INFERENCE_HTTP_RETRIES: ${INFERENCE_HTTP_RETRIES:-1}
      INFERENCE_RETRY_BACKOFF_MS: ${INFERENCE_RETRY_BACKOFF_MS:-250}
      MAX_SUMMARY_POINTS: ${MAX_SUMMARY_POINTS:-5000}
      MAX_MAP_HTML_CHARS: ${MAX_MAP_HTML_CHARS:-8000000}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../data:/app/data:ro
      - ./outputs:/tmp/outputs

  dash:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "gunicorn --bind 0.0.0.0:${PORT:-8050}
      --workers ${WEB_CONCURRENCY:-1}
      --threads ${WEB_THREADS:-2}
      --timeout 120
      wsgi:server"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      PORT: ${PORT:-8050}
      DATA_DIR: /app/data
      OUTPUT_DIR: /tmp/outputs
      API_BASE_URL: http://api:8000
      API_STARTUP_POLL_SECONDS: ${API_STARTUP_POLL_SECONDS:-3}
      API_KEEPALIVE_SECONDS: ${API_KEEPALIVE_SECONDS:-60}
      API_STARTUP_MAX_ATTEMPTS: ${API_STARTUP_MAX_ATTEMPTS:-0}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_SUMMARY_POINTS: ${MAX_SUMMARY_POINTS:-5000}
      MAX_MAP_HTML_CHARS: ${MAX_MAP_HTML_CHARS:-8000000}
    depends_on:
      - api
    ports:
      - "${PORT:-8050}:8050"
    volumes:
      - ../data:/app/data:ro
      - ./outputs:/tmp/outputs
