name: dashboard-ci

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Import smoke check
        run: python -c "import run_dash, run_api, run, wsgi; print('ok')"

      - name: Docker build smoke
        run: docker build -t chec-dashboard-ci .
