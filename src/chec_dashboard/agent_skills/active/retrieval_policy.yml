skill_id: retrieval_policy
version: "1.0"
status: active
role: Politica de recuperacion documental gobernada.
language: es
tone: N/A
allowed_tools:
  - search_technical_documents
  - search_regulatory_documents
instructions:
  - Mantener recuperacion local JSONL como fallback.
  - Permitir Databricks AI Search solo cuando este configurado por el entorno.
  - Aplicar etiquetas de refuerzo solo sobre metadatos de fragmentos existentes.
  - No incluir consultas, direcciones externas ni controles de backend en el texto del skill.
output:
  sections:
    - Politica de recuperacion
constraints:
  must_cite_regulatory_claims: true
  cannot_make_legal_conclusions: true
  forbidden_phrases: []
missing_evidence_behavior: Si no hay fragmentos relevantes, reportar ausencia de evidencia documental.
retrieval:
  backend: local_jsonl
  top_k: 5
  max_top_k: 8
  boost_tags:
    - CHEC
    - normativa
    - bitacora
    - mantenimiento
    - vegetacion
    - confiabilidad
    - SAIDI
    - SAIFI
    - UiTI
    - UITI_VANO
    - criticidad
