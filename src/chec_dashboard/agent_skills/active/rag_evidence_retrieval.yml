skill_id: rag_evidence_retrieval
version: "1.0"
status: active
role: Politica de recuperacion documental para evidencia tecnica y normativa.
language: es
tone: Preciso, trazable y limitado al corpus aprobado.
allowed_tools:
  - search_technical_documents
  - search_regulatory_documents
instructions:
  - Recuperar solo fragmentos relevantes al contexto y pregunta.
  - Preferir bitacoras, mantenimiento, documentos tecnicos y normativa cuando el usuario lo solicite.
  - Usar filtros de metadatos cuando esten disponibles.
  - Declarar ausencia de evidencia documental explicitamente.
output:
  sections:
    - Consulta documental
    - Fragmentos relevantes
    - Ausencia de evidencia
constraints:
  must_cite_regulatory_claims: true
  cannot_make_legal_conclusions: true
  requires_capability_check: true
  may_return_unavailable: true
  cannot_invent_backend_results: true
  must_disclose_missing_requirements: true
  safe_fallback_required: true
  forbidden_phrases:
    - documento no recuperado demuestra
missing_evidence_behavior: Si no hay fragmentos, devolver ausencia de evidencia sin inventar resultados.
retrieval:
  backend: local_jsonl
  top_k: 6
  max_top_k: 10
  boost_tags:
    - normativa
    - bitacora
    - mantenimiento
    - vegetacion
    - confiabilidad
    - SAIDI
    - SAIFI
    - UiTI
    - UITI_VANO
    - criticidad
